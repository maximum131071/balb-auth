<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Logging in...</title>
    <style>
        body { background: #0A0A0F; color: #F0F0F5; font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .loader { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.2); border-top-color: #FFD700; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #F44336; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner" id="spinner"></div>
        <p id="status">Logging you in...</p>
        <p class="error" id="error" style="display:none"></p>
    </div>
    <script>
    (function() {
        // Approved sites that can use this callback
        var APPROVED_SITES = [
            "http://localhost",
            "http://127.0.0.1",
            "https://bealuckyblockweb.pages.dev",
            "https://balb.xfrozenstudios.com",
            "https://be-a-lucky-block.xfrozenstudios.com",
            "https://bealuckyblock.xfrozenstudios.com"
        ];

        // VPS handles login normally, CF Function only under heavy load
        var VPS_EXCHANGE_URL = "https://api.xfrozenstudios.com/api/discord-exchange";
        var CF_EXCHANGE_URL = "https://bealuckyblockweb.pages.dev/api/discord-exchange";
        var MODE_URL = "https://maximum131071.github.io/balb-auth/mode.json";

        var params = new URLSearchParams(window.location.search);
        var code = params.get("code");
        var state = params.get("state");

        if (!code) {
            showError("No authorization code received.");
            return;
        }

        // Decode return URL from state
        var returnUrl = "";
        try {
            var stateData = JSON.parse(atob(state));
            returnUrl = stateData.returnUrl || "";
        } catch(e) {
            returnUrl = "";
        }

        // Verify return URL is approved
        var approved = APPROVED_SITES.some(function(site) {
            return returnUrl && returnUrl.indexOf(site) === 0;
        });
        if (!approved) returnUrl = APPROVED_SITES[APPROVED_SITES.length - 1];

        // Exchange code via the given URL
        function exchangeCode(url) {
            return fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: code })
            })
            .then(function(res) {
                return res.json().then(function(data) {
                    if (!res.ok || !data.success) {
                        var err = new Error(data.error || "Server returned " + res.status);
                        err.status = res.status;
                        throw err;
                    }
                    return data;
                });
            });
        }

        function onSuccess(data) {
            var token = encodeURIComponent(data.token);
            var user = encodeURIComponent(btoa(JSON.stringify(data.user)));
            var baseUrl = returnUrl.split('#')[0];
            var hash = "#/vote";
            window.location.href = baseUrl + hash + "?dtoken=" + token + "&duser=" + user;
        }

        // Check server mode, then route adaptively
        fetch(MODE_URL + "?t=" + Date.now())
            .then(function(res) { return res.ok ? res.json() : { mode: "vps" }; })
            .catch(function() { return { mode: "vps" }; })
            .then(function(data) {
                var mode = data.mode || "vps";
                // Use VPS in normal/split mode, CF Function only in workers mode
                var primary = (mode === "workers") ? CF_EXCHANGE_URL : VPS_EXCHANGE_URL;
                var fallback = (mode === "workers") ? VPS_EXCHANGE_URL : CF_EXCHANGE_URL;

                exchangeCode(primary)
                    .then(onSuccess)
                    .catch(function(err) {
                        // Only fallback on network errors or server errors (5xx)
                        // Don't fallback on client errors (400/403) — code is consumed, retrying won't help
                        if (err.status && err.status < 500) {
                            showError(err.message || "Login failed");
                            return;
                        }
                        // Server error or network failure — try fallback
                        document.getElementById("status").textContent = "Retrying...";
                        exchangeCode(fallback)
                            .then(onSuccess)
                            .catch(function(err2) {
                                showError(err2.message || "Something went wrong");
                            });
                    });
            });

        function showError(msg) {
            document.getElementById("spinner").style.display = "none";
            document.getElementById("status").textContent = "Login failed";
            var errorEl = document.getElementById("error");
            errorEl.textContent = msg;
            errorEl.style.display = "";
            // Redirect back after 3 seconds
            setTimeout(function() {
                if (returnUrl) window.location.href = returnUrl;
            }, 3000);
        }
    })();
    </script>
</body>
</html>
